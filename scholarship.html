<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url("{{ url_for('static', filename='images.png') }}") no-repeat center center fixed;
    background-size: cover;
}

/* Overlay */
.overlay {
    height: 100vh;
    width: 100%;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Main box */
.box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 450px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* Inputs */
select {
    width: 95%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* Button */
button {
    padding: 10px 20px;
    background: #0b3d91;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #082c6c;
}

/* Back button */
.back-btn {
    background: gray;
    margin-top: 10px;
}

/* ================= POPUP ================= */

.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* popup box */
.popup-content {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 650px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* title */
.popup-content h3 {
    margin-bottom: 15px;
    color: #0b3d91;
}

/* table */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #0b3d91;
    color: white;
    padding: 10px;
}

td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}

/* close button */
.close {
    float: right;
    cursor: pointer;
    font-size: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="overlay">

    <div class="box">
        <h2>🎓 Scholarships</h2>

        <form method="POST">

            <select name="degree" required>
                <option value="">Select Degree</option>
                <option value="master">Master</option>
                <option value="bachelor">Bachelor</option>
                <option value="phd">PhD</option>
                <option value="course">Course</option>
            </select>

           <select name="location" required>
    <option value="">Select Country</option>

    <option value="canada">Canada</option>
    <option value="europe">Europe</option>
    <option value="india">India</option>
    <option value="nigeria">Nigeria</option>
    <option value="pakistan">Pakistan</option>
    <option value="south-africa">South Africa</option>
    <option value="united-kingdom">United Kingdom</option>
    <option value="united-states">United States</option>

</select>
            <button type="submit">Find Scholarships</button>
        </form>

        <button class="back-btn" onclick="history.back()">⬅ Back</button>
    </div>

</div>

<!-- POPUP RESULT -->
{% if scholarships %}
<div class="popup">

    <div class="popup-content">

        <span class="close" onclick="window.location.href='/scholarship'">✖</span>

        <h3>🎓 Matching Scholarship Opportunities</h3>

        <table>
            <tr>
                <th>Scholarship Name</th>
                <th>Funding</th>
            </tr>

            {% for s in scholarships %}
            <tr>
                <td>{{ s['name'] }}</td>
                <td>{{ s['funds'] if s['funds'] else 'Contact provider' }}</td>
            </tr>
            {% endfor %}
        </table>

    </div>

</div>
{% endif %}

</body>
</html>
