<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url("/static/images.png") no-repeat center center fixed;
    background-size: cover;
}

/* Dark overlay */
.overlay {
    height:100vh;
    width:100%;
    background: rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Login box */
.login-box {
    background:white;
    padding:30px;
    border-radius:10px;
    text-align:center;
    width:300px;
}

/* Inputs */
input {
    width:90%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

/* Button */
button {
    padding:10px 20px;
    border:none;
    background:#0b3d91;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover {
    background:#082c6c;
}

/* Password wrapper */
.password-box {
    position: relative;
    width: 100%;
}

/* Eye icon */
.eye {
    position: absolute;
    right: 25px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 16px;
}
</style>

</head>

<body>

<div class="overlay">

    <div class="login-box">
        <h2>🔐 Login</h2>

        <form method="POST">

            <input name="username" placeholder="Username" required>

            <!-- PASSWORD WITH EYE -->
            <div class="password-box">
                <input type="password" name="password" id="password" placeholder="Password" required>
                <span class="eye" onclick="togglePassword()">👁️</span>
            </div>

            <button type="submit">Login</button>
        </form>

        {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}

        <button class="back-btn" onclick="history.back()">⬅ Back</button>
    </div>

</div>

<!-- JS FOR EYE TOGGLE -->
<script>
function togglePassword() {
    var pass = document.getElementById("password");

    if (pass.type === "password") {
        pass.type = "text";
    } else {
        pass.type = "password";
    }
}
</script>

</body>
</html>
